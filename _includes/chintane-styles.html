<style>
  :root {
    --bg: #fafaf7;
    --ink: #1a1a1a;
    --muted: #5b5b55;
    --rule: #e6e3d9;
    --link: #0969da;
    --mark: #fff3a0;
    --tldr-bg: #fbf6e4;
    --tldr-bar: #c8a93a;
    --badge-en: #1a1a1a;
    --badge-kn: #9b3d2a;
    --badge-chintane: #3a3d8a;
    --code-bg: #f4f1e8;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); }
  body {
    font: 16px/1.7 "Tiro Kannada", "Noto Sans Kannada", "Nirmala UI", "Kannada Sangam MN", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .nav { border-bottom: 1px solid var(--rule); background: var(--bg); }
  .nav-inner {
    max-width: 820px; margin: 0 auto; padding: 18px 32px;
    display: flex; align-items: baseline; justify-content: space-between; gap: 24px; flex-wrap: wrap;
  }
  .nav .home {
    font: 600 16px/1 Charter, "Iowan Old Style", "Noto Serif Kannada", Georgia, serif;
    color: var(--ink); text-decoration: none; letter-spacing: -0.01em;
  }
  .nav .home .kn { color: var(--muted); margin-left: 6px; font-weight: 500; }
  .nav .links { display: flex; gap: 18px; font: 500 13px/1 -apple-system, sans-serif; letter-spacing: 0.04em; }
  .nav .links a { color: var(--muted); text-decoration: none; }
  .nav .links a:hover, .nav .links a.active { color: var(--ink); }
  .nav .links a.active { font-weight: 600; }

  .page { max-width: 820px; margin: 0 auto; padding: 56px 32px 72px; }

  .eyebrow { font: 600 11px/1 -apple-system, sans-serif; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin: 0 0 10px; }

  h1.hero {
    font: 600 44px/1.15 Charter, "Iowan Old Style", "Noto Serif Kannada", Georgia, serif;
    letter-spacing: -0.015em; margin: 0 0 14px;
  }
  h1.hero .kn { font-weight: 500; color: var(--muted); margin-left: 12px; font-size: 0.78em; }

  h1.page-title {
    font: 600 36px/1.2 Charter, "Iowan Old Style", "Noto Serif Kannada", Georgia, serif;
    letter-spacing: -0.01em; margin: 0 0 12px;
  }

  .lede { font-size: 17px; line-height: 1.7; color: #2a2a24; max-width: 640px; margin: 0 0 12px; }
  .lede a { color: var(--link); text-decoration: none; }
  .lede a:hover { text-decoration: underline; }

  .cta {
    background: var(--tldr-bg); border-left: 3px solid var(--tldr-bar);
    padding: 18px 22px; border-radius: 2px; margin: 36px 0 0;
    display: flex; gap: 18px; align-items: baseline; flex-wrap: wrap;
  }
  .cta .label { font: 600 11px/1 -apple-system, sans-serif; letter-spacing: 0.18em; text-transform: uppercase; color: #7a6a1a; }
  .cta .body { flex: 1; min-width: 260px; font-size: 15px; line-height: 1.6; color: #4a4119; }
  .cta a { color: var(--link); text-decoration: none; font-weight: 600; }
  .cta a:hover { text-decoration: underline; }

  h2.section { font: 600 11px/1 -apple-system, sans-serif; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin: 56px 0 18px; }
  h2.year { font: 500 24px/1.2 Charter, "Iowan Old Style", Georgia, serif; color: var(--muted); margin: 32px 0 12px; }

  .posts { list-style: none; margin: 0; padding: 0; border-top: 1px solid var(--rule); }
  .posts li { padding: 22px 0; border-bottom: 1px solid var(--rule); display: grid; grid-template-columns: 112px 1fr; gap: 20px; align-items: baseline; }
  .posts .date { font: 500 12px/1.2 ui-monospace, SFMono-Regular, Menlo, monospace; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; padding-top: 4px; }
  .posts .main a { font: 500 19px/1.3 Charter, "Noto Serif Kannada", Georgia, serif; color: var(--ink); text-decoration: none; }
  .posts .main a:hover { color: var(--link); }
  .posts .main .dek { display: block; margin: 6px 0 10px; font-size: 14.5px; line-height: 1.55; color: #3a3a33; }

  .badges { display: flex; gap: 6px; flex-wrap: wrap; }
  .badge { display: inline-block; font: 600 10px/1.8 -apple-system, sans-serif; letter-spacing: 0.1em; text-transform: uppercase; padding: 0 7px; border-radius: 2px; color: #fff; }
  .badge.en { background: var(--badge-en); }
  .badge.kn { background: var(--badge-kn); }
  .badge.chintane { background: var(--badge-chintane); }

  .prose { font-size: 17px; line-height: 1.75; color: #1a1a1a; max-width: 680px; }
  .prose p { margin: 0 0 16px; }
  .prose a { color: var(--link); text-decoration: none; border-bottom: 1px dotted rgba(9,105,218,0.4); }
  .prose a:hover { border-bottom-style: solid; }
  .prose h2 { font: 600 24px/1.3 Charter, "Iowan Old Style", "Noto Serif Kannada", Georgia, serif; margin: 32px 0 12px; letter-spacing: -0.005em; }
  .prose h3 { font: 600 19px/1.3 Charter, "Iowan Old Style", "Noto Serif Kannada", Georgia, serif; margin: 24px 0 10px; }
  .prose ul, .prose ol { padding-left: 22px; margin: 0 0 16px; }
  .prose li { margin: 4px 0; }
  .prose blockquote { margin: 16px 0; padding: 8px 16px; border-left: 3px solid var(--rule); color: #3a3a33; font-style: italic; }
  .prose code { background: var(--code-bg); padding: 1px 5px; border-radius: 2px; font: 14px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace; }
  .prose pre { background: var(--code-bg); padding: 14px 16px; border-radius: 3px; overflow-x: auto; font: 13.5px/1.55 ui-monospace, SFMono-Regular, Menlo, monospace; }
  .prose pre code { background: none; padding: 0; }
  .prose img { max-width: 100%; height: auto; border-radius: 3px; }
  .prose hr { border: 0; border-top: 1px solid var(--rule); margin: 32px 0; }
  .prose table { border-collapse: collapse; margin: 16px 0; font-size: 14.5px; }
  .prose th, .prose td { border: 1px solid var(--rule); padding: 6px 10px; text-align: left; }
  .prose th { background: var(--code-bg); }

  .post-meta { font-size: 13px; color: var(--muted); margin: 0 0 32px; }
  .post-meta a { color: var(--muted); text-decoration: none; }
  .post-meta .dot { margin: 0 8px; color: var(--rule); }

  footer.site-foot {
    margin: 56px 0 0; padding: 20px 0 0; border-top: 1px solid var(--rule);
    font-size: 12px; color: var(--muted);
    display: flex; gap: 12px; flex-wrap: wrap; justify-content: space-between;
  }
  footer.site-foot a { color: var(--link); text-decoration: none; }

  @media (max-width: 640px) {
    .page { padding: 32px 20px 48px; }
    h1.hero { font-size: 34px; }
    h1.page-title { font-size: 28px; }
    .posts li { grid-template-columns: 1fr; gap: 6px; }
    .posts .date { padding-top: 0; }
  }
</style>
